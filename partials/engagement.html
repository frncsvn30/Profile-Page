<article class="performance-card">
  <h2>Engagement</h2>

  <div class="overview">
    <div class="chart-container">
      <div
        class="radial-chart"
        style="--p1: 52.63; --p2: 35.09; --p3: 12.28"
      ></div>
    </div>

    <div class="legend">
      <div class="legend-item">
        <div class="legend-dot dot-blue"></div>
        <span>Meetings Attended</span>
        <span class="percent">60</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot dot-orange"></div>
        <span>Hours Worked</span>
        <span class="percent">40 hrs</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot dot-teal"></div>
        <span>Check-In</span>
        <span class="percent">14</span>
      </div>
    </div>
  </div>
</article>
